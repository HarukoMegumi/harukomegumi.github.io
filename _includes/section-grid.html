<style>
  .section-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.25rem;
    margin: 2rem 0;
  }

  .section-card {
    display: flex;
    min-height: 15rem;
    overflow: hidden;
    position: relative;
    align-items: flex-end;
    border-radius: 8px;
    color: #fff;
    text-decoration: none;
    background: #222;
    box-shadow: 0 0.6rem 1.8rem rgba(0, 0, 0, 0.16);
  }

  .section-card:hover,
  .section-card:focus {
    color: #fff;
    text-decoration: none;
    transform: translateY(-2px);
  }

  .section-card__image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 180ms ease;
  }

  .section-card:hover .section-card__image,
  .section-card:focus .section-card__image {
    transform: scale(1.04);
  }

  .section-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.08));
  }

  .section-card__title {
    position: relative;
    z-index: 1;
    margin: 0;
    padding: 1rem;
    font-size: clamp(1.25rem, 2vw, 1.75rem);
    font-weight: 700;
    line-height: 1.15;
  }

  @media (max-width: 760px) {
    .section-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="section-grid">
  {% for section in site.data.sections %}
    <a class="section-card" href="{{ section.url | relative_url }}">
      <img class="section-card__image" src="{{ section.thumbnail | relative_url }}" alt="">
      <h2 class="section-card__title">{{ section.name }}</h2>
    </a>
  {% endfor %}
</div>
